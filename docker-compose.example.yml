# MetaMaster — Docker Compose Template
#
# Quick start:
#   1. Copy this file:  cp docker-compose.example.yml docker-compose.yml
#   2. Copy the env:    cp .env.example .env
#   3. Fill in .env with your TMDB token and media paths
#   4. Run:             docker compose up -d
#
# Images are pulled automatically from GitHub Container Registry.
# Postgres data is stored in a named Docker volume (persists across restarts).

services:

  frontend:
    image: ghcr.io/john-limb/metamaster-frontend:latest
    ports:
      - "80:8080"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - public
      - internal
    restart: unless-stopped

  app:
    image: ghcr.io/john-limb/metamaster:latest
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:${POSTGRES_PASSWORD:-metamaster}@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MEDIA_SCAN_SCHEDULE=${MEDIA_SCAN_SCHEDULE:-0 2 * * *}
    volumes:
      - ${MOVIE_DIR}:/media/movies:ro
      - ${TV_DIR}:/media/tv:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  celery_worker:
    image: ghcr.io/john-limb/metamaster:latest
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:${POSTGRES_PASSWORD:-metamaster}@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ${MOVIE_DIR}:/media/movies:ro
      - ${TV_DIR}:/media/tv:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  celery_beat:
    image: ghcr.io/john-limb/metamaster:latest
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:${POSTGRES_PASSWORD:-metamaster}@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MEDIA_SCAN_SCHEDULE=${MEDIA_SCAN_SCHEDULE:-0 2 * * *}
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: metamaster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metamaster}
      POSTGRES_DB: metamaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_data:
