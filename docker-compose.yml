version: '3.8'

services:
  # Frontend React application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: MetaMaster_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://app:8000/api/v1
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: MetaMaster_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: MetaMaster_postgres
    environment:
      POSTGRES_USER: metamaster
      POSTGRES_PASSWORD: metamaster
      POSTGRES_DB: metamaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamaster"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI application
  app:
    build: .
    container_name: MetaMaster_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker-specific overrides
      - DATABASE_URL=postgresql+psycopg2://metamaster:metamaster@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=True
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost,http://localhost:5173,http://localhost:8000,http://127.0.0.1,http://127.0.0.1:8000,http://app,http://app:8000,http://frontend,http://MetaMaster_frontend
      - TRUSTED_HOSTS=localhost,127.0.0.1,localhost:8000,app,app:8000,frontend,MetaMaster_frontend
    volumes:
       - ./app:/app/app
       - ${MOVIE_DIR}:/media/movies:ro
       - ${TV_DIR}:/media/tv:ro
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Celery worker for background task processing
  celery_worker:
    build: .
    container_name: MetaMaster_celery_worker
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:metamaster@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ${MOVIE_DIR}:/media/movies
      - ${TV_DIR}:/media/tv
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery -A app.tasks.celery_app worker' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Celery beat scheduler for periodic tasks
  celery_beat:
    build: .
    container_name: MetaMaster_celery_beat
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:metamaster@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ${MOVIE_DIR}:/media/movies
      - ${TV_DIR}:/media/tv
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery -A app.tasks.celery_app beat' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: MetaMaster_network


volumes:
  postgres_data:
