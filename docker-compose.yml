version: '3.8'

# =============================================================================
# Docker Network Security Configuration
# =============================================================================
# This configuration implements a secure network architecture where:
# - Frontend is the only service exposed externally (port 80)
# - Backend API, PostgreSQL, and Redis are on an internal network
# - No direct external access to backend services
# 
# For development with debug ports exposed, use:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# =============================================================================

services:
  # Frontend React application
  # Only service exposed externally - serves as reverse proxy for API
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: MetaMaster_frontend
    ports:
      - "80:8080"
    # Note: VITE_API_BASE_URL is baked at build time in the Dockerfile (=/api/v1),
    # not at runtime. Nginx proxies /api/ to the backend.
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Frontend only needs access to the app service via internal network
    networks:
      - public
      - internal

  # Redis cache
  # Internal only - no external access
  redis:
    image: redis:7-alpine
    container_name: MetaMaster_redis
    # No ports exposed - internal network only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # PostgreSQL database
  # Internal only - no external access
  postgres:
    image: postgres:15-alpine
    container_name: MetaMaster_postgres
    environment:
      POSTGRES_USER: metamaster
      POSTGRES_PASSWORD: metamaster
      POSTGRES_DB: metamaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed - internal network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # FastAPI application
  # Internal only - accessed via frontend nginx reverse proxy
  app:
    build: .
    container_name: MetaMaster_app
    # No ports exposed - internal network only
    # Access via frontend nginx reverse proxy at /api/
    env_file:
      - .env
    environment:
      # Docker-specific overrides
      - DATABASE_URL=postgresql+psycopg2://metamaster:metamaster@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost,http://localhost:5173,http://localhost:8000,http://127.0.0.1,http://127.0.0.1:8000,http://app,http://app:8000,http://frontend,http://MetaMaster_frontend
      - TRUSTED_HOSTS=localhost,127.0.0.1,localhost:5173,localhost:8000,127.0.0.1:5173,127.0.0.1:8000,app,app:8000,frontend,MetaMaster_frontend
      # Internal API key for service-to-service communication
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
       - ./app:/app/app
       - ${HOST_MOVIE_DIR:-./_media/movies}:/media/movies:ro
       - ${HOST_TV_DIR:-./_media/tv}:/media/tv:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - internal

  # Celery worker for background task processing
  # Internal only - processes async tasks
  celery_worker:
    build: .
    container_name: MetaMaster_celery_worker
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:metamaster@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - LOG_LEVEL=INFO
      # Internal API key for service-to-service communication
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ./app:/app/app
      - ${HOST_MOVIE_DIR:-./_media/movies}:/media/movies
      - ${HOST_TV_DIR:-./_media/tv}:/media/tv
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery -A app.tasks.celery_app worker' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # Celery beat scheduler for periodic tasks
  # Internal only - schedules periodic tasks
  celery_beat:
    build: .
    container_name: MetaMaster_celery_beat
    environment:
      - DATABASE_URL=postgresql+psycopg2://metamaster:metamaster@postgres:5432/metamaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - LOG_LEVEL=INFO
      # Internal API key for service-to-service communication
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ./app:/app/app
      - ${HOST_MOVIE_DIR:-./_media/movies}:/media/movies
      - ${HOST_TV_DIR:-./_media/tv}:/media/tv
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery -A app.tasks.celery_app beat' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal

# =============================================================================
# Network Configuration
# =============================================================================
# public: External access for frontend only (port 80)
# internal: Private network for backend services (no external access)
# =============================================================================
networks:
  public:
    name: MetaMaster_public
    driver: bridge
    # Public network for externally accessible services
  internal:
    name: MetaMaster_internal
    driver: bridge
    # Internal network for backend services
    # No external routing - services can only communicate with each other


volumes:
  postgres_data:
