version: '3.8'

services:
  # Redis service for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: media_tool_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI application
  app:
    build: .
    container_name: media_tool_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./media.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ./media:/app/media
      - ./media.db:/app/media.db
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Celery worker for background tasks
  celery_worker:
    build: .
    container_name: media_tool_celery_worker
    environment:
      - DATABASE_URL=sqlite:///./media.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ./media:/app/media
      - ./media.db:/app/media.db
    depends_on:
      - redis
      - app
    command: celery -A app.tasks worker --loglevel=info
    restart: unless-stopped

  # Celery Beat for scheduled tasks
  celery_beat:
    build: .
    container_name: media_tool_celery_beat
    environment:
      - DATABASE_URL=sqlite:///./media.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ./media:/app/media
      - ./media.db:/app/media.db
    depends_on:
      - redis
      - app
    command: celery -A app.tasks beat --loglevel=info
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: media_tool_network
