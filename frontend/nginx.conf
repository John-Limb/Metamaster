# =============================================================================
# Nginx Configuration for MetaMaster
# =============================================================================
# This configuration serves the React SPA and proxies API requests to the backend.
# It includes rate limiting for authentication endpoints to prevent brute force attacks.
#
# Security Features:
# - Rate limiting on auth endpoints (login: 5/min, register: 3/hour)
# - Proper proxy headers for client IP identification
# - Connection limits to prevent DoS
# =============================================================================

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ==========================================================================
    # Rate Limiting Configuration
    # ==========================================================================
    # Rate limiting zones are defined here and referenced in location blocks.
    # - login_limit: 5 requests per minute per IP (brute force protection)
    # - register_limit: 3 requests per hour per IP (account creation abuse)
    # ==========================================================================
    
    # Rate limit zone for login endpoint: 5 requests per minute
    # Key: client IP address ($binary_remote_addr is more memory efficient)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    
    # Rate limit zone for registration endpoint: ~3 requests per hour
    # nginx only supports r/s and r/m; 1r/m with burst=2 approximates 3r/h
    limit_req_zone $binary_remote_addr zone=register_limit:10m rate=1r/m;
    
    # Connection limit per IP to prevent DoS
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream configuration for backend API
    upstream backend {
        server app:8000;
    }

    # HTTP server
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health check endpoint (no rate limiting)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ======================================================================
        # Authentication Endpoints with Rate Limiting
        # ======================================================================
        # These endpoints have stricter rate limits to prevent abuse.
        # nodelay: processes requests immediately up to burst limit
        # burst: allows temporary spikes before rejecting
        # ======================================================================
        
        # Login endpoint: 5 requests per minute per IP
        # Protects against brute force password attacks
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=2 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 10;
            
            proxy_pass http://backend/api/v1/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Custom error response for rate limiting
            error_page 429 = @rate_limited;
        }
        
        # Registration endpoint: ~3 requests per hour per IP (1r/m + burst=1)
        # Protects against automated account creation
        location /api/v1/auth/register {
            limit_req zone=register_limit burst=1 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 10;
            
            proxy_pass http://backend/api/v1/auth/register;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Custom error response for rate limiting
            error_page 429 = @rate_limited;
        }
        
        # Rate limit error response
        location @rate_limited {
            default_type application/json;
            return 429 '{"detail": "Too many requests. Please try again later.", "status_code": 429}';
        }

        # ======================================================================
        # General API Proxy
        # ======================================================================
        # All other API routes use standard proxy settings without rate limiting.
        # Proper headers are set for backend to identify the original client.
        # ======================================================================
        location /api/ {
            limit_conn conn_limit 20;
            
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Root location - serve React SPA
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
