name: Code Quality (manual)

# Too expensive for automatic runs — trigger manually when needed
on:
  workflow_dispatch:

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit safety

      - name: Bandit
        run: bandit -r app/ -f txt || true

      - name: Safety
        run: safety check || true

  complexity:
    name: Code Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install radon
        run: pip install radon

      - name: Complexity report
        run: |
          radon cc app/ -a -s || true
          radon mi app/ -s || true
