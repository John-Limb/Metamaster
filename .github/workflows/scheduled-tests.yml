name: Scheduled Tests and Audits

on:
  schedule:
    - cron: '0 2 * * *'      # Nightly full test suite at 2 AM UTC
    - cron: '0 3 * * 0'      # Weekly performance benchmarks on Sunday at 3 AM UTC
    - cron: '0 4 1 * *'      # Monthly security audit on 1st of month at 4 AM UTC

jobs:
  nightly-full-test:
    name: Nightly Full Test Suite
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all unit tests
        run: pytest tests/ -v -k "unit" --tb=short

      - name: Run all integration tests
        run: pytest tests/ -v -k "integration" --tb=short

      - name: Run end-to-end tests
        run: pytest tests/ -v -k "e2e" --tb=short || true

      - name: Generate full coverage report
        run: pytest tests/ --cov=app --cov-report=html --cov-report=term-missing --tb=short

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: nightly-coverage-report
          path: htmlcov/

      - name: Notify on failure
        if: failure()
        run: |
          echo "Nightly test suite failed!"
          # Add notification logic here (Slack, email, etc.)

  weekly-performance-benchmarks:
    name: Weekly Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run performance benchmarks
        run: |
          pytest tests/ -v -k "performance" --benchmark-only --benchmark-json=benchmark-results.json || true

      - name: Run database performance tests
        run: pytest tests/test_performance_database.py -v --tb=short || true

      - name: Store benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: performance-benchmarks
          path: benchmark-results.json

      - name: Compare with baseline
        run: |
          echo "Comparing performance benchmarks with baseline..."
          # Add comparison logic here

      - name: Notify on performance regression
        if: failure()
        run: |
          echo "Performance regression detected!"
          # Add notification logic here

  monthly-security-audit:
    name: Monthly Security Audit
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 1 * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Run comprehensive Bandit scan
        run: |
          bandit -r app/ -f json -o bandit-full-report.json
          bandit -r app/ -f txt

      - name: Run comprehensive Safety check
        run: |
          safety check --json > safety-full-report.json || true
          safety check

      - name: Run OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'media-management-tool'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --enableRetired

      - name: Upload security audit reports
        uses: actions/upload-artifact@v3
        with:
          name: security-audit-reports
          path: |
            bandit-full-report.json
            safety-full-report.json
            reports/

      - name: Generate security report summary
        run: |
          echo "Security Audit Summary" > security-summary.txt
          echo "======================" >> security-summary.txt
          echo "Bandit Results:" >> security-summary.txt
          cat bandit-full-report.json >> security-summary.txt || true
          echo "" >> security-summary.txt
          echo "Safety Results:" >> security-summary.txt
          cat safety-full-report.json >> security-summary.txt || true

      - name: Notify on security issues
        if: failure()
        run: |
          echo "Security issues detected during audit!"
          # Add notification logic here

  dependency-updates:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Check for outdated packages
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit --desc > outdated-packages.txt || true
          cat outdated-packages.txt

      - name: Upload outdated packages report
        uses: actions/upload-artifact@v3
        with:
          name: outdated-packages-report
          path: outdated-packages.txt

      - name: Create issue for outdated dependencies
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Outdated dependencies detected',
              body: 'Scheduled dependency check found outdated packages. Please review and update.',
              labels: ['dependencies', 'maintenance']
            })
