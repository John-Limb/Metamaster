name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Version bump, changelog, GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump pyproject.toml version
        run: |
          sed -i \
            's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' \
            pyproject.toml
          grep -q '^version = "${{ steps.version.outputs.version }}"' pyproject.toml \
            || { echo "ERROR: pyproject.toml version bump failed"; exit 1; }

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Bump frontend/package.json version
        working-directory: frontend
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Generate full CHANGELOG.md
        run: git-cliff -o CHANGELOG.md

      - name: Generate release notes for this tag
        run: git-cliff --latest --strip all -o release-notes.md

      - name: Commit version bump and changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml frontend/package.json frontend/package-lock.json CHANGELOG.md
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin release-bump-${{ steps.version.outputs.version }} || true
          git push origin HEAD:release-bump-${{ steps.version.outputs.version }}
          gh pr create --base main --head release-bump-${{ steps.version.outputs.version }} --title "Release ${{ steps.version.outputs.version }}" --body "Automated release PR"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if echo "${{ steps.version.outputs.version }}" | grep -q '-'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "MetaMaster $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG
